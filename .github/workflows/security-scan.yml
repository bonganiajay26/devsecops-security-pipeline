name: DevSecOps — Security Scan Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/python-devops-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Secret Scanning
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─────────────────────────────────────────────
  # JOB 2: SAST — Static Application Security Testing
  # ─────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
          generateSarif: "1"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

  # ─────────────────────────────────────────────
  # JOB 3: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
        if: always()

  # ─────────────────────────────────────────────
  # JOB 4: Build Secure Docker Image
  # ─────────────────────────────────────────────
  build-secure:
    name: Build Secure Docker Image
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dependency-scan]
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.secure
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Image vulnerability scan ───
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
        if: always()

      # ─── Generate SBOM ───
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.vars.outputs.sha }}
          path: sbom.json

      # ─── Sign image with Cosign ───
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push signed image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.secure
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          echo "Image signed with Cosign. Verify with:"
          echo "cosign verify --certificate-identity-regexp=https://github.com/${{ github.repository }} \\"
          echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \\"
          echo "  ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}"

  # ─────────────────────────────────────────────
  # JOB 5: IaC Security Scan (Kubernetes manifests)
  # ─────────────────────────────────────────────
  iac-scan:
    name: IaC Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on K8s manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
        if: always()
